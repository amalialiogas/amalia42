<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Invaders</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hud">
        <div class="score">
          <span class="label">Score</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="lives">
          <span class="label">Lives</span>
          <span id="lives"></span>
        </div>
        <div class="level">
          <span class="label">Level</span>
          <span id="level" class="value">1</span>
        </div>
      </header>

      <canvas id="game" width="720" height="900"></canvas>
      <audio id="ufo-audio" src="ufo_highpitch.wav" preload="auto" loop></audio>
      <audio id="fast-invader-audio" src="fastinvader1.wav" preload="auto" loop></audio>
      <audio id="player-explosion-audio" src="explosion.wav" preload="auto"></audio>

      <section class="panel">
        <div class="controls">
          <button id="start">Start</button>
          <button id="pause">Pause</button>
          <button id="reset">Reset</button>
          <button id="sound">Sound: On</button>
        </div>
        <p>
          Controls: Arrow keys or A/D to move. Space to shoot. P to pause.
        </p>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
