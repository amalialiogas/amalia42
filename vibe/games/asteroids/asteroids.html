<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asteroids</title>
  <link rel="stylesheet" href="styles.css">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-W05ENH4Q9Q"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-W05ENH4Q9Q');
</script>
</head>
<body>
  <canvas id="gameCanvas" aria-label="Asteroids game canvas"></canvas>

  <header class="hud" aria-live="polite">
    <div class="hud-item">
      <span class="label">Score</span>
      <span id="score">000000</span>
    </div>
    <div class="hud-item">
      <span class="label">Lives</span>
      <span id="lives">3</span>
    </div>
    <div class="hud-item">
      <span class="label">Level</span>
      <span id="level">1</span>
    </div>
  </header>

  <section id="overlay" class="overlay show" aria-live="assertive">
    <h1>ASTEROIDS</h1>
    <p id="overlayText">Press Enter to start</p>
    <p class="help">Controls: Left/Right rotate, Up thrust, Space fire, Enter restart</p>
  </section>

  <script src="game.js"></script>
</body>
</html>
